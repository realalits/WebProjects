
<html>
<head>

<body>
  
<div class="bg-portal">
<img src="/SBI_YONO_Logo.svg.png" alt="/SBI_YONO_Logo.svg.png"  height="50px">  

<h3>
    ONLINE PAYMENT PORTAL</h3>
<div class="flex-container">

<div class="inner-content">    


<label for="CARD HOLDER"><i class="fas fa-user-alt"></i> 
  
  CARD HOLDER</label>
<input type="text" placeholder="Enter Full Name">




<label for="CARD NUMBER">
<i class="fas fa-credit-card"></i>CARD NUMBER*</label>
<input type="number" placeholder="0000-1111-2222-3333">




<label for="EXP DATE"><i class="fas fa-calendar-week"></i>
  EXP DATE*</label>
<input type="MONTH" placeholder="mm//yyyy">

<label for="CVV" required><i class="fas fa-key"></i>
  CVV*</label>
<input type="password" placeholder="xxxxxxx123">





</div>






<div class="inner-content">
  
  
  <label for="ENTER OTP">ENTER OTP* </label>
  <input type="number" placeholder="OTP">
  
  
  <button class="submitbtn" >SUBMIT</button>
  <button class="resetbtn" >RESET</button>
  
  
<i id="icon" class="fab fa-cc-visa fa-lg" style="color: #00a800;"> </i>
  
<i id="icon" class="fab fa-cc-mastercard fa-lg" style="color: #ff0000;"></i>

<i id="icon" class="fab fa-cc-stripe fa-lg" style="color: #0076a1;"></i>
<i id="icon"  class="fab fa-cc-paypal fa-lg" style="color: #e8a600;"></i>
  
</div>


      </div>  

<input type="checkbox"><span>I agree to the term & Condition.
</span>
<br>
<button class="sendbtn">Send OTP</button>


<p>SBIePay is an online payment aggregation service provided by State Bank of India, India's most recognised & trusted brand in banking, and the only Bank in India to have their own Payment Aggregation platform.</p>
        
        
        
   </div>
